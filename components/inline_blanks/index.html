<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 10px 6px;
    background: transparent;
  }
  #sentence {
    font-size: 1.1em;
    line-height: 3.2;
    word-break: break-word;
  }
  .blank-input {
    border: none;
    border-bottom: 2px solid #4F8EF7;
    background: #e8f0fe;
    padding: 2px 6px;
    font-size: 1em;
    text-align: center;
    outline: none;
    border-radius: 4px 4px 0 0;
    min-width: 40px;
    font-family: monospace;
    vertical-align: middle;
    transition: background 0.15s;
  }
  .blank-input:focus {
    background: #c5d8ff;
    border-bottom-color: #2060d0;
  }
  .result-correct {
    color: #2e7d32;
    font-weight: bold;
    background: #e8f5e9;
    border-radius: 4px;
    padding: 1px 6px;
  }
  .result-wrong {
    color: #c62828;
    font-weight: bold;
    background: #ffebee;
    border-radius: 4px;
    padding: 1px 6px;
  }
  #submit-btn {
    margin-top: 16px;
    padding: 10px 28px;
    background: #4F8EF7;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1em;
    font-weight: 600;
    display: block;
  }
  #submit-btn:active { background: #3a7be0; }
</style>
</head>
<body>
<div id="sentence"></div>
<div id="submit-area"></div>

<script>
  var savedValues = {};
  var blankCount = 0;

  function onRender(args) {
    var tokens  = args.tokens  || [];
    var hints   = args.hints   || [];
    var results = args.results;
    var showResults = (results !== null && results !== undefined);

    saveCurrentValues();

    var div = document.getElementById('sentence');
    div.innerHTML = '';
    blankCount = 0;

    tokens.forEach(function(t) {
      if (t.blank) {
        if (showResults) {
          var span = document.createElement('span');
          span.className = results[blankCount] ? 'result-correct' : 'result-wrong';
          span.textContent = t.answer;
          div.appendChild(document.createTextNode(' '));
          div.appendChild(span);
          div.appendChild(document.createTextNode(' '));
        } else {
          var input = document.createElement('input');
          input.type = 'text';
          input.className = 'blank-input';
          input.id = 'b' + blankCount;
          input.style.width = Math.max(t.answer.length * 13 + 20, 48) + 'px';

          if (savedValues[blankCount] !== undefined) {
            input.value = savedValues[blankCount];
          }

          if (hints[blankCount]) {
            input.placeholder = t.answer[0] + '_'.repeat(Math.max(t.answer.length - 1, 0));
          } else {
            input.placeholder = '_'.repeat(t.answer.length);
          }

          (function(idx) {
            input.addEventListener('keydown', function(e) {
              if (e.key === 'Enter' || e.key === 'Tab') {
                e.preventDefault();
                var next = document.getElementById('b' + (idx + 1));
                if (next) { next.focus(); }
                else { submitAnswers(); }
              }
            });
          })(blankCount);

          div.appendChild(document.createTextNode(' '));
          div.appendChild(input);
          div.appendChild(document.createTextNode(' '));
        }
        blankCount++;
      } else {
        div.appendChild(document.createTextNode(t.token));
      }
    });

    var submitArea = document.getElementById('submit-area');
    if (!showResults) {
      submitArea.innerHTML = '<button id="submit-btn" onclick="submitAnswers()">✅ 제출</button>';
    } else {
      submitArea.innerHTML = '';
    }

    adjustHeight();
  }

  function saveCurrentValues() {
    for (var i = 0; i < blankCount; i++) {
      var el = document.getElementById('b' + i);
      if (el) savedValues[i] = el.value;
    }
  }

  function submitAnswers() {
    var answers = [];
    for (var i = 0; i < blankCount; i++) {
      var el = document.getElementById('b' + i);
      answers.push(el ? el.value.trim() : '');
    }
    savedValues = {};
    sendValue({ type: 'submit', answers: answers });
  }

  function sendValue(value) {
    window.parent.postMessage({
      type: 'streamlit:setComponentValue',
      value: value,
      dataType: 'json'
    }, '*');
  }

  function adjustHeight() {
    setTimeout(function() {
      window.parent.postMessage({
        type: 'streamlit:setFrameHeight',
        height: document.body.scrollHeight + 20
      }, '*');
    }, 80);
  }

  window.addEventListener('message', function(e) {
    if (e.data.type === 'streamlit:render') onRender(e.data.args);
  });

  window.parent.postMessage({ type: 'streamlit:componentReady', apiVersion: 1 }, '*');
</script>
</body>
</html>
